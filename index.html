<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台灣鐵道車種百科</title>
<style>
  :root {
    --color-bg: #f0f4f8;
    --color-card-bg: #ffffff;
    --color-text: #1a202c;
    --color-text-muted: #4a5568;
    --color-header-from: #1a365d;
    --color-header-to: #2a4365;
    --color-chip-bg: #e2e8f0;
    --color-chip-text: #2d3748;
    --color-chip-active-type: #2b6cb0;
    --color-chip-active-region: #276749;
    --color-chip-active-era: #c05621;
    --color-shadow: rgba(0,0,0,0.12);
    --color-shadow-hover: rgba(0,0,0,0.22);
    --color-border: #e2e8f0;
    --color-tag-bg: #edf2f7;
    --color-tag-text: #4a5568;
    --color-fun-bg: #fffbeb;
    --color-fun-border: #f6e05e;
    --color-search-border: rgba(255,255,255,0.4);
    --radius-card: 14px;
    --radius-chip: 20px;
    --radius-tag: 6px;
    --font: 'Segoe UI', 'Noto Sans TC', Arial, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--color-bg);
    color: var(--color-text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .site-header {
    background: linear-gradient(135deg, var(--color-header-from) 0%, var(--color-header-to) 60%, #1e4a8a 100%);
    padding: 32px 20px 28px;
    position: relative;
    overflow: hidden;
  }
  .site-header::after {
    content: '🚆';
    position: absolute;
    right: -10px;
    top: 50%;
    transform: translateY(-50%);
    font-size: clamp(80px, 18vw, 160px);
    opacity: 0.13;
    pointer-events: none;
    line-height: 1;
  }
  .header-inner { max-width: 1200px; margin: 0 auto; position: relative; z-index: 1; }
  .site-title {
    font-size: clamp(1.6rem, 5vw, 2.8rem);
    font-weight: 800;
    color: #fff;
    letter-spacing: 0.02em;
    line-height: 1.2;
    text-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .site-subtitle {
    color: rgba(255,255,255,0.75);
    font-size: clamp(0.85rem, 2.5vw, 1.1rem);
    margin-top: 6px;
    font-weight: 400;
  }
  .search-wrap {
    margin-top: 20px;
    max-width: 500px;
  }
  .search-input {
    width: 100%;
    padding: 12px 18px;
    border-radius: 30px;
    border: 2px solid var(--color-search-border);
    background: rgba(255,255,255,0.15);
    color: #fff;
    font-size: 1rem;
    font-family: var(--font);
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    backdrop-filter: blur(4px);
  }
  .search-input::placeholder { color: rgba(255,255,255,0.6); }
  .search-input:focus {
    border-color: rgba(255,255,255,0.8);
    background: rgba(255,255,255,0.22);
  }

  /* ── FILTER BAR ── */
  .filter-bar {
    background: var(--color-card-bg);
    border-bottom: 1px solid var(--color-border);
    padding: 16px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
  }
  .filter-bar-inner { max-width: 1200px; margin: 0 auto; }
  .filter-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .filter-row:last-child { margin-bottom: 0; }
  .filter-label {
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--color-text-muted);
    min-width: 36px;
    margin-right: 2px;
  }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    padding: 5px 14px;
    border-radius: var(--radius-chip);
    border: 1.5px solid transparent;
    background: var(--color-chip-bg);
    color: var(--color-chip-text);
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s;
    user-select: none;
    white-space: nowrap;
  }
  .chip:hover { opacity: 0.85; transform: translateY(-1px); }
  .chip.active-type {
    background: var(--color-chip-active-type);
    color: #fff;
    border-color: var(--color-chip-active-type);
  }
  .chip.active-region {
    background: var(--color-chip-active-region);
    color: #fff;
    border-color: var(--color-chip-active-region);
  }
  .chip.active-era {
    background: var(--color-chip-active-era);
    color: #fff;
    border-color: var(--color-chip-active-era);
  }
  .result-count {
    font-size: 0.85rem;
    color: var(--color-text-muted);
    margin-top: 10px;
    font-weight: 500;
  }
  .result-count strong { color: var(--color-text); }

  /* ── MAIN / GRID ── */
  .main { max-width: 1200px; margin: 0 auto; padding: 20px 16px 60px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }
  @media (min-width: 600px) {
    .grid { grid-template-columns: repeat(3, 1fr); }
  }
  @media (min-width: 900px) {
    .grid { grid-template-columns: repeat(4, 1fr); }
  }

  /* ── CARD ── */
  .card {
    background: var(--color-card-bg);
    border-radius: var(--radius-card);
    box-shadow: 0 2px 8px var(--color-shadow);
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    overflow: hidden;
    animation: fadeIn 0.35s ease both;
  }
  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 24px var(--color-shadow-hover);
  }
  .card.active {
    box-shadow: 0 6px 20px var(--color-shadow-hover);
    outline: 3px solid rgba(43,108,176,0.4);
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-top {
    height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    position: relative;
  }
  .card-top-stripe {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 4px;
    background: rgba(255,255,255,0.35);
  }
  .card-body { padding: 10px 12px 12px; }
  .card-name {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--color-text);
    line-height: 1.3;
    margin-bottom: 2px;
  }
  .card-model {
    font-size: 0.75rem;
    color: var(--color-text-muted);
    margin-bottom: 2px;
  }
  .card-operator {
    font-size: 0.72rem;
    color: var(--color-text-muted);
    margin-bottom: 8px;
  }
  .card-tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .tag {
    padding: 2px 8px;
    border-radius: var(--radius-tag);
    background: var(--color-tag-bg);
    color: var(--color-tag-text);
    font-size: 0.68rem;
    font-weight: 600;
  }

  /* ── DETAIL PANEL ── */
  .detail-panel-wrap {
    grid-column: 1 / -1;
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.5s cubic-bezier(0.4,0,0.2,1);
  }
  .detail-panel-wrap.open {
    /* max-height set inline in JS to element's scrollHeight */
  }
  .detail-panel {
    background: var(--color-card-bg);
    border-radius: var(--radius-card);
    box-shadow: 0 4px 20px var(--color-shadow-hover);
    overflow: hidden;
    margin-bottom: 4px;
  }

  .detail-header {
    padding: 20px 20px 18px;
    position: relative;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .detail-header-emoji { font-size: 3.5rem; line-height: 1; flex-shrink: 0; }
  .detail-header-info { flex: 1; min-width: 0; }
  .detail-header-name {
    font-size: 1.5rem;
    font-weight: 800;
    color: #fff;
    text-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }
  .detail-header-model {
    font-size: 0.9rem;
    color: rgba(255,255,255,0.85);
    margin-top: 2px;
  }
  .detail-header-operator {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.7);
    margin-top: 2px;
  }
  .close-btn {
    position: absolute;
    top: 14px; right: 14px;
    background: rgba(255,255,255,0.2);
    border: none;
    color: #fff;
    width: 32px; height: 32px;
    border-radius: 50%;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
    flex-shrink: 0;
    z-index: 2;
  }
  .close-btn:hover { background: rgba(255,255,255,0.35); }

  .detail-body { padding: 20px; }

  /* SVG area */
  .svg-area {
    width: 100%;
    background: #f7fafc;
    border-radius: 10px;
    border: 2px dashed var(--color-border);
    min-height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .svg-area svg { max-width: 100%; height: auto; }
  .svg-placeholder {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    color: #a0aec0; font-size: 0.85rem; padding: 24px;
  }
  .svg-placeholder span:first-child { font-size: 2.5rem; }

  /* Photo slots */
  .img-slots {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }
  .img-slot {
    aspect-ratio: 4/3;
    border: 2px dashed #cbd5e0;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #a0aec0;
    font-size: 0.72rem;
    gap: 6px;
    background: #f7fafc;
  }
  .img-slot span:first-child { font-size: 1.6rem; }
  .img-slot--svg {
    background: #f0f4f8;
    border: 1.5px solid #e2e8f0;
    padding: 8px;
    overflow: hidden;
  }
  .img-slot--svg svg {
    width: 100%;
    height: 100%;
    display: block;
  }
  .img-slot--photo {
    border: none;
    background: #000;
    overflow: hidden;
    padding: 0;
  }
  .img-slot--photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 6px;
    display: block;
  }

  /* Description */
  .detail-desc {
    font-size: 0.92rem;
    line-height: 1.75;
    color: var(--color-text);
    margin-bottom: 18px;
  }

  /* Specs grid */
  .specs-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 18px;
  }
  .spec-item {
    background: #f7fafc;
    border-radius: 8px;
    padding: 12px 14px;
    border: 1px solid var(--color-border);
  }
  .spec-label {
    font-size: 0.72rem;
    color: var(--color-text-muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }
  .spec-value {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--color-text);
  }

  /* Routes */
  .section-title {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--color-text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
  }
  .routes-wrap { margin-bottom: 18px; }
  .route-name {
    font-size: 0.8rem;
    color: var(--color-text-muted);
    font-weight: 600;
    margin-bottom: 6px;
  }
  .route-stations-scroll {
    overflow-x: auto;
    padding-bottom: 6px;
    -webkit-overflow-scrolling: touch;
  }
  .route-stations {
    display: inline-flex;
    align-items: flex-start;
    white-space: nowrap;
    padding: 6px 2px;
  }
  .station {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .station-row {
    display: flex;
    align-items: center;
  }
  .station-dot {
    width: 11px; height: 11px;
    border-radius: 50%;
    border: 2.5px solid currentColor;
    background: #fff;
    flex-shrink: 0;
  }
  .station-line {
    width: 26px;
    height: 3px;
    background: currentColor;
    opacity: 0.35;
  }
  .station-name {
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--color-text);
    text-align: center;
    max-width: 40px;
    word-break: break-all;
    white-space: normal;
    line-height: 1.2;
  }

  /* Features */
  .features-list {
    list-style: none;
    margin-bottom: 18px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .features-list li {
    font-size: 0.9rem;
    color: var(--color-text);
    display: flex;
    align-items: flex-start;
    gap: 8px;
    line-height: 1.5;
  }
  .features-list li::before {
    content: '✨';
    flex-shrink: 0;
  }

  /* Fun fact */
  .fun-fact {
    background: var(--color-fun-bg);
    border: 2px solid var(--color-fun-border);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .fun-fact-icon { font-size: 1.5rem; flex-shrink: 0; }
  .fun-fact-text { font-size: 0.9rem; line-height: 1.65; color: #744210; font-weight: 500; }

  /* No results */
  .no-results {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--color-text-muted);
  }
  .no-results-emoji { font-size: 3rem; display: block; margin-bottom: 12px; }
  .no-results p { font-size: 1rem; }

  @media (max-width: 480px) {
    .img-slots { grid-template-columns: repeat(3, 1fr); }
    .specs-grid { grid-template-columns: 1fr 1fr; }
    .station-line { width: 16px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="header-inner">
    <h1 class="site-title">🚞 台灣鐵道車種百科</h1>
    <p class="site-subtitle">從捷運到高鐵，探索台灣所有鐵道車輛</p>
    <div class="search-wrap">
      <input class="search-input" type="search" id="searchInput"
             placeholder="🔍 搜尋車名、型號、營運單位…" autocomplete="off">
    </div>
  </div>
</header>

<!-- FILTER BAR -->
<div class="filter-bar">
  <div class="filter-bar-inner">
    <div class="filter-row">
      <span class="filter-label">車種</span>
      <div class="chips" id="typeChips"></div>
    </div>
    <div class="filter-row">
      <span class="filter-label">地區</span>
      <div class="chips" id="regionChips"></div>
    </div>
    <div class="filter-row">
      <span class="filter-label">年代</span>
      <div class="chips" id="eraChips"></div>
    </div>
    <div class="result-count" id="resultCount">符合條件：<strong>0</strong> 種車輛</div>
  </div>
</div>

<!-- MAIN -->
<main class="main">
  <div class="grid" id="grid"></div>
</main>

<!-- EXTERNAL DATA (optional) -->
<script src="data.js"></script>
<script src="illustrations.js"></script>

<script>
const data = window.TRAIN_DATA;

/* ──────────────────────────────────
   FILTER CONFIG (derived from data)
────────────────────────────────── */
function yearToDecade(year) {
  if (!year) return "";
  return `${Math.floor(year / 10) * 10}s`;
}

const TYPES   = ["全部", ...new Set(data.map(d => d.type))];
const REGIONS = ["全部", ...new Set(data.flatMap(d => d.region || []))];
const ERAS    = ["全部", ...[...new Set(data.map(d => yearToDecade(d.yearStart)))].sort()];

let activeType   = "全部";
let activeRegion = "全部";
let activeEra    = "全部";
let searchQuery  = "";
let openCardId   = null;

/* ── CHIPS ── */
function buildChips(containerId, items, activeClass, getActive, setter) {
  const el = document.getElementById(containerId);
  el.innerHTML = "";
  items.forEach(item => {
    const btn = document.createElement("button");
    btn.className = "chip" + (getActive() === item ? " " + activeClass : "");
    btn.textContent = item;
    btn.addEventListener("click", () => {
      setter(item);
      buildChips(containerId, items, activeClass, getActive, setter);
      render();
    });
    el.appendChild(btn);
  });
}

function buildAllChips() {
  buildChips("typeChips",   TYPES,   "active-type",   () => activeType,   v => { activeType   = v; });
  buildChips("regionChips", REGIONS, "active-region", () => activeRegion, v => { activeRegion = v; });
  buildChips("eraChips",    ERAS,    "active-era",    () => activeEra,    v => { activeEra    = v; });
}

/* ── FILTERS ── */
function matchesFilters(v) {
  if (activeType   !== "全部" && v.type !== activeType)                          return false;
  if (activeRegion !== "全部" && !(v.region && v.region.includes(activeRegion))) return false;
  if (activeEra    !== "全部" && yearToDecade(v.yearStart) !== activeEra)        return false;
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    const hay = [v.name, v.nameEn, v.model, v.operator, v.type, ...(v.tags||[])].join(" ").toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

/* ── HTML / URL / COLOR HELPERS ── */
const ESC_MAP = { "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" };
function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ESC_MAP[c]);
}

function safeColor(hex) {
  return /^#[0-9a-fA-F]{6}$/.test(hex) ? hex : "#4a5568";
}

function safePhotoUrl(url) {
  if (!url) return "";
  if (/^https:\/\//i.test(url)) return url;
  if (/^images\/[\w./-]+$/.test(url)) return url;
  return "";
}

function adjustColor(hex, amt) {
  if (!hex || !hex.startsWith("#")) return "#2d3748";
  let r = parseInt(hex.slice(1,3),16);
  let g = parseInt(hex.slice(3,5),16);
  let b = parseInt(hex.slice(5,7),16);
  r = Math.max(0, Math.min(255, r + amt));
  g = Math.max(0, Math.min(255, g + amt));
  b = Math.max(0, Math.min(255, b + amt));
  return "#" + [r,g,b].map(x => x.toString(16).padStart(2,"0")).join("");
}

function gradient(color, delta=-30) {
  const c = safeColor(color);
  return `linear-gradient(135deg,${c} 0%,${adjustColor(c, delta)} 100%)`;
}

/* ── DETAIL HTML ── */
function buildDetailHTML(v) {
  // Specs
  const specs = [
    { label:"最高時速", value: v.maxSpeed      ? v.maxSpeed      + " km/h" : "—" },
    { label:"車廂節數", value: v.cars           ? v.cars           + " 節"  : "—" },
    { label:"製造商",   value: v.manufacturer  || "—" },
    { label:"啟用年份", value: v.yearStart      ? v.yearStart      + " 年"  : "—" }
  ];
  const specsHTML = specs.map(s =>
    `<div class="spec-item"><div class="spec-label">${esc(s.label)}</div><div class="spec-value">${esc(s.value)}</div></div>`
  ).join("");

  // Routes
  let routesHTML = "";
  if (v.routes && v.routes.length) {
    const clr = safeColor(v.color);
    routesHTML = v.routes.map(r => {
      const stHTML = r.stations.map((s, i) => {
        const isLast = i === r.stations.length - 1;
        return `<div class="station" style="color:${clr}">
          <div class="station-row">
            <div class="station-dot"></div>
            ${!isLast ? `<div class="station-line"></div>` : ""}
          </div>
          <div class="station-name">${esc(s)}</div>
        </div>`;
      }).join("");
      return `<div class="route-name">${esc(r.name)}</div>
              <div class="route-stations-scroll"><div class="route-stations">${stHTML}</div></div>`;
    }).join("");
  }

  // Features
  const featHTML = (v.features||[]).map(f => `<li>${esc(f)}</li>`).join("");

  const photo = safePhotoUrl(v.photoUrl);
  const svg = (window.TRAIN_SVG && window.TRAIN_SVG[v.id]) || "";

  return `
    <div class="detail-header" style="background:${gradient(v.color, -35)};">
      <div class="detail-header-emoji">${esc(v.emoji || "🚂")}</div>
      <div class="detail-header-info">
        <div class="detail-header-name">${esc(v.name)}</div>
        <div class="detail-header-model">${esc(v.nameEn || "")}${v.model ? " · " + esc(v.model) : ""}</div>
        <div class="detail-header-operator">${esc(v.operator || "")}</div>
      </div>
      <button class="close-btn" onclick="closeDetail()" title="關閉">✕</button>
    </div>
    <div class="detail-body">
      <div class="img-slots">
        ${photo
          ? `<div class="img-slot img-slot--photo"><img src="${esc(photo)}" alt="${esc(v.name)}" loading="lazy" onerror="this.parentElement.innerHTML='&lt;span&gt;📷&lt;/span&gt;&lt;span&gt;照片&lt;/span&gt;'"></div>`
          : `<div class="img-slot"><span>📷</span><span>照片</span></div>`
        }
        <div class="img-slot img-slot--svg">
          ${svg || `<span>${esc(v.emoji || "🚂")}</span><span style="font-size:0.7rem;color:#a0aec0">插畫</span>`}
        </div>
      </div>
      <p class="detail-desc">${esc(v.description || "")}</p>
      <div class="section-title">技術規格</div>
      <div class="specs-grid">${specsHTML}</div>
      ${routesHTML ? `<div class="section-title">營運路線</div><div class="routes-wrap">${routesHTML}</div>` : ""}
      ${featHTML   ? `<div class="section-title">特色亮點</div><ul class="features-list">${featHTML}</ul>` : ""}
      ${v.funFact  ? `<div class="fun-fact"><div class="fun-fact-icon">🎉</div><div class="fun-fact-text">${esc(v.funFact)}</div></div>` : ""}
    </div>`;
}

/* ── DETAIL PANEL OPEN/CLOSE ── */
function getPanelForCard(id) {
  return document.querySelector(`.detail-panel-wrap[data-for-${CSS.escape(id)}]`);
}

function mountDetail(panel, v, { animate = true } = {}) {
  const inner = panel.querySelector(".detail-panel");
  inner.innerHTML = buildDetailHTML(v);
  panel.classList.add("open");
  // Set max-height to actual content height so CSS transition works and no clipping
  panel.style.maxHeight = animate ? inner.scrollHeight + "px" : "none";
}

function openDetail(id) {
  const panel = getPanelForCard(id);
  if (!panel) return;
  const v = data.find(x => x.id === id);
  if (!v) return;

  // Close previous if different row
  if (openCardId && openCardId !== id) {
    const prev = getPanelForCard(openCardId);
    if (prev) { prev.classList.remove("open"); prev.style.maxHeight = ""; }
    document.querySelector(`.card[data-id="${openCardId}"]`)?.classList.remove("active");
  }

  mountDetail(panel, v);
  openCardId = id;
  document.querySelector(`.card[data-id="${id}"]`)?.classList.add("active");
  setTimeout(() => panel.scrollIntoView({ behavior:"smooth", block:"nearest" }), 80);
}

function closeDetail() {
  if (!openCardId) return;
  const panel = getPanelForCard(openCardId);
  if (panel) { panel.classList.remove("open"); panel.style.maxHeight = ""; }
  document.querySelector(`.card[data-id="${openCardId}"]`)?.classList.remove("active");
  openCardId = null;
}

function toggleDetail(id) {
  if (openCardId === id) closeDetail();
  else openDetail(id);
}

/* ── RENDER ── */
function getColumns() {
  const w = window.innerWidth;
  if (w >= 900) return 4;
  if (w >= 600) return 3;
  return 2;
}

function render() {
  const grid     = document.getElementById("grid");
  const filtered = data.filter(matchesFilters);
  document.getElementById("resultCount").innerHTML =
    `符合條件：<strong>${filtered.length}</strong> 種車輛`;

  grid.innerHTML = "";

  if (!filtered.length) {
    grid.innerHTML = `<div class="no-results">
      <span class="no-results-emoji">🔍</span>
      <p>找不到符合條件的車輛，試試看其他篩選條件？</p>
    </div>`;
    openCardId = null;
    return;
  }

  const cols = getColumns();
  const wasOpen = openCardId; // preserve across re-render

  // Chunk into rows
  for (let i = 0; i < filtered.length; i += cols) {
    const row = filtered.slice(i, i + cols);
    const rowIds = row.map(v => v.id);

    // Cards
    row.forEach(v => {
      const card = document.createElement("div");
      card.className = "card" + (v.id === wasOpen ? " active" : "");
      card.dataset.id = v.id;
      card.setAttribute("role", "button");
      card.setAttribute("tabindex", "0");
      card.setAttribute("aria-label", v.name);
      card.innerHTML = `
        <div class="card-top" style="background:${gradient(v.color)};">
          ${esc(v.emoji || "🚂")}
          <div class="card-top-stripe"></div>
        </div>
        <div class="card-body">
          <div class="card-name">${esc(v.name)}</div>
          <div class="card-model">${esc(v.model || "")}</div>
          <div class="card-operator">${esc(v.operator || "")}</div>
          <div class="card-tags">
            <span class="tag">${esc(v.type)}</span>
            ${(v.region||[]).slice(0,1).map(r => `<span class="tag">${esc(r)}</span>`).join("")}
            <span class="tag">${esc(yearToDecade(v.yearStart))}</span>
          </div>
        </div>`;
      card.addEventListener("click",    ()  => toggleDetail(v.id));
      card.addEventListener("keydown",  e   => { if (e.key==="Enter"||e.key===" ") { e.preventDefault(); toggleDetail(v.id); } });
      grid.appendChild(card);
    });

    // One detail panel per row, spanning all columns
    const panelWrap = document.createElement("div");
    panelWrap.className = "detail-panel-wrap";
    rowIds.forEach(id => panelWrap.setAttribute(`data-for-${id}`, "1"));
    panelWrap.innerHTML = `<div class="detail-panel"></div>`;
    grid.appendChild(panelWrap);

    // Re-open if this row contained the previously open card
    if (wasOpen && rowIds.includes(wasOpen)) {
      const v = data.find(x => x.id === wasOpen);
      if (v) {
        mountDetail(panelWrap, v, { animate: false });
        document.querySelector(`.card[data-id="${wasOpen}"]`)?.classList.add("active");
      }
    }
  }
}

/* ── INIT ── */
document.getElementById("searchInput").addEventListener("input", e => { searchQuery = e.target.value.trim(); render(); });
let lastColumns = getColumns();
window.addEventListener("resize", () => {
  const cols = getColumns();
  if (cols !== lastColumns) {
    lastColumns = cols;
    render();
  }
});
buildAllChips();
render();

</script>
